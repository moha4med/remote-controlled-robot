<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Sensors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/design-tokens.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/sensors.css') }}" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body class="page-sensors" data-sensors-dashboard>

    <div class="d-flex vh-100">

      <!-- Sidebar -->
      <nav class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-logo" aria-hidden="true">RC</div>
        <ul class="nav flex-column sidebar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}" aria-label="Dashboard"><i class="bi bi-activity"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('control.index') }}" aria-label="Control"><i class="bi bi-sliders"></i></a></li>
          <li class="nav-item"><a class="nav-link active" href="{{ url_for('sensors.index') }}" aria-label="Sensors"><i class="bi bi-bar-chart"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('captures.index') }}" aria-label="Captures"><i class="bi bi-camera"></i></a></li>
        </ul>
        <div class="mt-auto d-flex flex-column gap-2">
          <button class="btn btn-outline-secondary btn-sm rounded-2" type="button" data-fullscreen-toggle aria-label="Toggle fullscreen">
            <i class="bi bi-arrows-fullscreen"></i>
          </button>
          <button class="btn btn-outline-secondary btn-sm rounded-2" type="button" data-theme-toggle aria-label="Toggle theme">
            <i class="bi bi-sun"></i>
          </button>
        </div>
      </nav>

      <!-- Main -->
      <main class="flex-grow-1 overflow-auto p-3 p-md-4">

        <!-- System Metrics -->
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <div>
              <p class="text-muted text-uppercase mb-0" style="font-size:10px;letter-spacing:.08em">System</p>
              <h2 class="h6 fw-bold mb-0">Host Metrics</h2>
            </div>
            <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-25" id="sysStatusBadge">
              <span class="d-inline-block rounded-circle bg-success me-1" style="width:6px;height:6px"></span> Live
            </span>
          </div>
          <div class="card-body">
            <div class="row g-3 text-center">
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-cpu me-1"></i>CPU</div>
                  <div class="h4 fw-bold font-mono mb-0" id="sysCpuSensors">--%</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-memory me-1"></i>Memory</div>
                  <div class="h4 fw-bold font-mono mb-0" id="sysMemSensors">--%</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-hdd me-1"></i>Disk</div>
                  <div class="h4 fw-bold font-mono mb-0" id="sysDiskSensors">--%</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-thermometer-half me-1"></i>CPU Temp</div>
                  <div class="h4 fw-bold font-mono mb-0" id="sysCpuTempSensors">--°C</div>
                </div>
              </div>
            </div>
            <div class="mt-2 text-center">
              <small class="text-muted">Uptime: </small>
              <small class="font-mono" id="sysUptimeSensors">--</small>
            </div>
          </div>
        </div>

        <!-- KPI Cards -->
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <div>
              <p class="text-muted text-uppercase mb-0" style="font-size:10px;letter-spacing:.08em">Overview</p>
              <h2 class="h6 fw-bold mb-0">Sensor KPIs</h2>
            </div>
            <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-25">
              <span class="d-inline-block rounded-circle bg-success me-1" style="width:6px;height:6px"></span> Live
            </span>
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary text-center">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-thermometer me-1"></i>Temp</div>
                  <div class="h3 fw-bold font-mono mb-0" id="tempValueCard">--</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary text-center">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-droplet me-1"></i>Humidity</div>
                  <div class="h3 fw-bold font-mono mb-0" id="humidityValueCard">--</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary text-center">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-activity me-1"></i>Sampling</div>
                  <div class="h3 fw-bold font-mono mb-0">2.5s</div>
                </div>
              </div>
              <div class="col-6 col-lg-3">
                <div class="p-3 rounded bg-dark bg-opacity-50 border border-secondary text-center">
                  <div class="text-muted text-uppercase mb-1" style="font-size:9px;letter-spacing:.08em"><i class="bi bi-clock me-1"></i>Last Sync</div>
                  <div class="h3 fw-bold font-mono mb-0" id="sensorSync">--:--:--</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Chart View Toggle -->
        <div class="card mb-3">
          <div class="card-body py-2">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
              <div class="d-flex align-items-center gap-2">
                <span class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">View:</span>
                <div class="btn-group btn-group-sm" role="group" id="chartViewToggle">
                  <button type="button" class="btn btn-outline-secondary active" data-view="realtime" title="Real-time readings">
                    <i class="bi bi-activity me-1"></i>Real-time
                  </button>
                  <button type="button" class="btn btn-outline-secondary" data-view="hourly" title="Hourly averages">
                    <i class="bi bi-clock me-1"></i>Hourly
                  </button>
                </div>
              </div>
              <div class="d-flex align-items-center gap-1" id="hourlyRange" style="display:none">
                <span class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Range:</span>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-hours="6">6h</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-hours="12">12h</button>
                <button type="button" class="btn btn-sm btn-secondary" data-hours="24">24h</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" data-hours="48">48h</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Temperature Chart -->
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <div>
              <p class="text-muted text-uppercase mb-0" style="font-size:10px;letter-spacing:.08em">Temperature</p>
              <h2 class="h6 fw-bold mb-0" id="tempChartTitle">Thermal Trend</h2>
            </div>
            <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-25" id="tempChartBadge">Live</span>
          </div>
          <div class="card-body position-relative chart-body">
            <div id="tempChart" class="sensor-chart"></div>
          </div>
        </div>

        <!-- Humidity Chart -->
        <div class="card mb-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <div>
              <p class="text-muted text-uppercase mb-0" style="font-size:10px;letter-spacing:.08em">Humidity</p>
              <h2 class="h6 fw-bold mb-0" id="humidityChartTitle">Humidity Trend</h2>
            </div>
            <span class="badge bg-success bg-opacity-25 text-success border border-success border-opacity-25" id="humidityChartBadge">Live</span>
          </div>
          <div class="card-body position-relative chart-body">
            <div id="humidityChart" class="sensor-chart"></div>
          </div>
        </div>

      </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/sensors.plugin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page-init.js') }}"></script>
  </body>
</html>
