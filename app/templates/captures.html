<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Captures</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/design-tokens.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/sensors.css') }}" />
    <style>
      .capture-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
      .capture-card { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-border-subtle); cursor: pointer; transition: border-color .2s; background: var(--color-bg-panel-raised); }
      .capture-card:hover { border-color: var(--color-accent); }
      .capture-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
      .capture-card__time { display: block; padding: 4px 8px; font-size: 10px; color: var(--color-text-muted); font-family: 'JetBrains Mono', monospace; text-align: right; }
      .capture-preview-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,.92); display: flex; align-items: center; justify-content: center; padding: 20px; }
      .capture-preview-overlay img { max-width: 100%; max-height: 100%; border-radius: 8px; }
      .capture-preview-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .capture-preview-close:hover { background: rgba(255,255,255,.2); }
    </style>
  </head>
  <body class="page-captures" data-captures-page>

    <div class="d-flex vh-100">

      <!-- Sidebar -->
      <nav class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-logo" aria-hidden="true">RC</div>
        <ul class="nav flex-column sidebar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}" aria-label="Dashboard"><i class="bi bi-activity"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('control.index') }}" aria-label="Control"><i class="bi bi-sliders"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('sensors.index') }}" aria-label="Sensors"><i class="bi bi-bar-chart"></i></a></li>
          <li class="nav-item"><a class="nav-link active" href="{{ url_for('captures.index') }}" aria-label="Captures"><i class="bi bi-camera"></i></a></li>
        </ul>
        <div class="mt-auto d-flex flex-column gap-2">
          <button class="btn btn-outline-secondary btn-sm rounded-2" type="button" data-fullscreen-toggle aria-label="Toggle fullscreen">
            <i class="bi bi-arrows-fullscreen"></i>
          </button>
          <button class="btn btn-outline-secondary btn-sm rounded-2" type="button" data-theme-toggle aria-label="Toggle theme">
            <i class="bi bi-sun"></i>
          </button>
        </div>
      </nav>

      <!-- Main -->
      <main class="flex-grow-1 overflow-auto p-3 p-md-4">

        <!-- Header -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <div>
            <p class="text-muted text-uppercase mb-1" style="font-size:11px;letter-spacing:.08em">Gallery</p>
            <h1 class="h4 fw-bold mb-0">Captured Images</h1>
          </div>
          <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-secondary"><i class="bi bi-image me-1"></i> <span id="captureCount">0</span></span>
            <button class="btn btn-sm btn-primary" id="btnNewCapture" type="button">
              <i class="bi bi-camera-fill me-1"></i> New Capture
            </button>
          </div>
        </div>

        <!-- Gallery Grid -->
        <div class="capture-grid" id="captureGallery">
          <div class="text-center text-muted py-5 w-100" id="galleryEmpty">
            <i class="bi bi-camera" style="font-size:32px;opacity:.4"></i>
            <p class="mt-2 mb-0">No captures yet. Click <strong>New Capture</strong> to take a photo.</p>
          </div>
        </div>

      </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/captures.plugin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page-init.js') }}"></script>
  </body>
</html>
