<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/design-tokens.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style/control.css') }}" />
  </head>
  <body class="page-control" data-control-surface data-sensors-url="{{ url_for('sensors_api.environment') }}">

    <!-- Mobile: fullscreen camera by default -->
    <div class="d-md-none mobile-camera-wrap">
      <img id="liveStreamMobile" src="{{ url_for('camera.video_feed') }}" alt="Live camera stream" class="mobile-camera-feed" />
      <div class="mobile-camera-overlay-top">
        <span class="badge bg-dark bg-opacity-75">RCR-001</span>
        <span class="badge bg-dark bg-opacity-75 font-mono" id="topTimeMobile">--:--:--</span>
      </div>
      <div class="mobile-camera-overlay-bottom">
        <span class="badge bg-dark bg-opacity-75" id="topTempMobile">--°C</span>
        <span class="badge bg-dark bg-opacity-75" id="topHumidityMobile">--%</span>
        <span class="badge bg-dark bg-opacity-75" id="topBatteryMobile">--%</span>
        <span class="badge bg-dark bg-opacity-75" id="topSignalMobile">--%</span>
      </div>
      <!-- Tap to show controls -->
      <button class="btn btn-sm btn-outline-light mobile-toggle-controls" type="button">
        <i class="bi bi-sliders"></i>
      </button>
    </div>

    <!-- Mobile controls drawer -->
    <div class="d-md-none mobile-controls-drawer" id="mobileControls">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="mb-0 text-uppercase text-muted" style="font-size:11px;letter-spacing:.08em">Controls</h6>
        <button class="btn btn-sm btn-outline-secondary mobile-toggle-controls" type="button">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="dpad mb-3" aria-label="Directional controls">
        <button class="dpad-btn dpad-btn--up" data-command="forward" type="button"><i class="bi bi-chevron-up"></i></button>
        <button class="dpad-btn dpad-btn--left" data-command="left" type="button"><i class="bi bi-chevron-left"></i></button>
        <button class="dpad-center" data-command="stop" type="button"><span class="dpad-label">Stop</span></button>
        <button class="dpad-btn dpad-btn--right" data-command="right" type="button"><i class="bi bi-chevron-right"></i></button>
        <button class="dpad-btn dpad-btn--down" data-command="backward" type="button"><i class="bi bi-chevron-down"></i></button>
      </div>

      <button class="btn btn-danger w-100 mb-3" data-command="stop" type="button">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Emergency Stop
      </button>

      <div class="row g-2 text-center">
        <div class="col-6">
          <div class="p-2 rounded bg-dark bg-opacity-50 border border-secondary">
            <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Battery</div>
            <div class="fw-bold" id="battery-value-mobile">75%</div>
          </div>
        </div>
        <div class="col-6">
          <div class="p-2 rounded bg-dark bg-opacity-50 border border-secondary">
            <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Signal</div>
            <div class="fw-bold" id="signal-value-mobile">92%</div>
          </div>
        </div>
        <div class="col-6">
          <div class="p-2 rounded bg-dark bg-opacity-50 border border-secondary">
            <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Speed</div>
            <div class="fw-bold" id="speed-value-mobile">0 km/h</div>
          </div>
        </div>
        <div class="col-6">
          <div class="p-2 rounded bg-dark bg-opacity-50 border border-secondary">
            <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">State</div>
            <div class="fw-bold text-info" id="robot-state-mobile">STOP</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Desktop layout -->
    <div class="d-none d-md-flex app-layout">

      <!-- Sidebar -->
      <nav class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-logo" aria-hidden="true">RC</div>
        <ul class="nav flex-column sidebar-nav">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.index') }}" aria-label="Dashboard"><i class="bi bi-activity"></i></a></li>
          <li class="nav-item"><a class="nav-link active" href="{{ url_for('control.index') }}" aria-label="Control"><i class="bi bi-sliders"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('sensors.index') }}" aria-label="Sensors"><i class="bi bi-bar-chart"></i></a></li>
        </ul>
        <div class="mt-auto">
          <button class="btn btn-outline-secondary btn-sm rounded-2" type="button" data-theme-toggle aria-label="Toggle theme">
            <i class="bi bi-sun"></i>
          </button>
        </div>
      </nav>

      <!-- Main content -->
      <div class="flex-grow-1 d-flex flex-column overflow-hidden">

        <!-- Camera -->
        <div class="flex-grow-1 position-relative camera-wrap">
          <img id="liveStream" src="{{ url_for('camera.video_feed') }}" alt="Live camera stream" class="camera-feed" />

          <div class="camera-overlay camera-overlay--top">
            <span class="badge bg-dark bg-opacity-75">RCR-001</span>
            <span class="badge bg-dark bg-opacity-75 font-mono" id="topTime">--:--:--</span>
          </div>

          <div class="camera-overlay camera-overlay--bottom">
            <span class="badge bg-dark bg-opacity-75" id="topTemp">--°C <i class="bi bi-thermometer"></i></span>
            <span class="badge bg-dark bg-opacity-75" id="topHumidity">--% <i class="bi bi-droplet"></i></span>
            <span class="badge bg-dark bg-opacity-75" id="topBattery">--% <i class="bi bi-battery"></i></span>
            <span class="badge bg-dark bg-opacity-75" id="topSignal">--% <i class="bi bi-wifi"></i></span>
          </div>
        </div>

        <!-- Bottom control bar -->
        <div class="control-bar p-3 border-top border-secondary">
          <div class="row align-items-center g-3">
            <div class="col-auto">
              <div class="dpad" aria-label="Directional controls">
                <button class="dpad-btn dpad-btn--up" data-command="forward" type="button"><i class="bi bi-chevron-up"></i></button>
                <button class="dpad-btn dpad-btn--left" data-command="left" type="button"><i class="bi bi-chevron-left"></i></button>
                <button class="dpad-center" data-command="stop" type="button"><span class="dpad-label">Stop</span></button>
                <button class="dpad-btn dpad-btn--right" data-command="right" type="button"><i class="bi bi-chevron-right"></i></button>
                <button class="dpad-btn dpad-btn--down" data-command="backward" type="button"><i class="bi bi-chevron-down"></i></button>
              </div>
            </div>
            <div class="col-auto">
              <button class="btn btn-danger" data-command="stop" type="button">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> E-Stop
              </button>
            </div>
            <div class="col">
              <div class="d-flex gap-3 justify-content-end text-center">
                <div>
                  <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Battery</div>
                  <div class="fw-bold" id="battery-value">75%</div>
                  <div class="battery-bars" id="battery-bars">
                    <span class="battery-bar"></span><span class="battery-bar"></span><span class="battery-bar"></span>
                    <span class="battery-bar"></span><span class="battery-bar"></span><span class="battery-bar"></span>
                    <span class="battery-bar"></span><span class="battery-bar"></span><span class="battery-bar"></span>
                    <span class="battery-bar"></span><span class="battery-bar"></span>
                  </div>
                </div>
                <div>
                  <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Signal</div>
                  <div class="fw-bold" id="signal-value">92%</div>
                </div>
                <div>
                  <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">Speed</div>
                  <div class="fw-bold" id="speed-value">0 km/h</div>
                </div>
                <div>
                  <div class="text-muted text-uppercase" style="font-size:9px;letter-spacing:.08em">State</div>
                  <div class="fw-bold text-info" id="robot-state">STOP</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/control.plugin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/page-init.js') }}"></script>
  </body>
</html>
